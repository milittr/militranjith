<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Work | Milit Ranjith</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Libre Baskerville', serif; background-color: #f8f8f8; }
    .diagram-line { border-top: 1px dashed #bbb; }
    .active-filter { background-color: #e5e7eb; }
  </style>
</head>
<body class="text-gray-800">

<header class="fixed top-0 w-full bg-white shadow-sm z-50">
  <nav class="max-w-6xl mx-auto flex justify-between items-center p-4">
    <h1 class="text-lg font-semibold">Milit Ranjith</h1>
    <div class="space-x-6 text-sm">
      <a href="index.html" class="hover:underline">About</a>
      <a href="work.html" class="font-bold border-b-2 border-black">Work</a>
      <a href="contact.html" class="hover:underline">Contact</a>
    </div>
  </nav>
</header>

<div class="h-16"></div>

<section class="max-w-6xl mx-auto p-6 mt-10">
  <h2 class="text-2xl mb-4">Work</h2>
  <div class="diagram-line mb-6"></div>

  <div class="mb-6 flex flex-wrap gap-2 text-sm">
    <button class="filter-btn active-filter px-3 py-1 border" data-filter="all">All</button>
    <button class="filter-btn px-3 py-1 border" data-filter="human">Human-Centered</button>
    <button class="filter-btn px-3 py-1 border" data-filter="robotics">Robotics</button>
    <button class="filter-btn px-3 py-1 border" data-filter="mechanical">Mechanical</button>
  </div>

  <div id="projectGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="project-card border p-4 cursor-pointer bg-white" data-category="human" onclick="openProject('vima')">
      <div class="h-40 bg-gray-100 mb-4 flex items-center justify-center text-xs text-gray-400 border">Project Image</div>
      <h3 class="text-sm">VIMA – Assistive Navigation Device</h3>
    </div>
    </div>
</section>

<section class="max-w-6xl mx-auto p-6 mt-20 mb-20">
  <h2 class="text-2xl mb-4">Skills</h2>
  <div class="diagram-line mb-6"></div>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-sm">
    <div>
      <h3 class="mb-2 font-semibold underline">Hardware</h3>
      <p>FEA, Sensors, Mechatronics</p>
    </div>
    <div>
      <h3 class="mb-2 font-semibold underline">Software / CAD</h3>
      <p>SolidWorks, Creo, NX, MATLAB, Python</p>
    </div>
    <div>
      <h3 class="mb-2 font-semibold underline">Manufacturing</h3>
      <p>CNC, 3D Printing, DFM</p>
    </div>
  </div>
</section>

<div id="projectModal" class="fixed inset-0 bg-black bg-opacity-40 hidden flex items-center justify-center z-50">
    </div>

<script>
    // Include the original filter-btn and openProject logic here
</script>
</body>
</html>
